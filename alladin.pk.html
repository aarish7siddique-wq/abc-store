<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABC Store</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'DM Sans',sans-serif;background:#f6f6f6}

/* TOP BAR */
.topbar{
background:#111;color:#fff;font-size:13px;padding:6px;
white-space:nowrap;overflow:hidden;text-align:center
}
.topbar span{display:inline-block;animation:scroll 15s linear infinite}
@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

/* HEADER */
.header{
background:#ff7a00;display:flex;align-items:center;
padding:15px 30px;gap:20px;position:sticky;top:0;z-index:1000
}
.logo{color:#fff;font-weight:700;font-size:22px}
.search{flex:1}
.search input{
width:100%;padding:12px 20px;border-radius:40px;border:none
}
.icons{color:#fff;display:flex;gap:20px;cursor:pointer}

/* NAV */
.nav{
background:#fff;padding:12px 30px;
display:flex;gap:25px;border-bottom:1px solid #ddd
}

/* LAYOUT */
.container{
display:grid;grid-template-columns:260px 1fr;
gap:20px;padding:20px
}

/* SIDEBAR */
.sidebar{
background:#fff;padding:15px;border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.05)
}
.sidebar div{
padding:10px;border-radius:6px;cursor:pointer;
transition:.2s
}
.sidebar div:hover{background:#f2f2f2}

/* HERO SLIDER */
.hero{position:relative;height:320px;border-radius:12px;overflow:hidden}
.slide{
position:absolute;width:100%;height:100%;
opacity:0;transition:.6s
}
.slide.active{opacity:1}
.slide img{width:100%;height:100%;object-fit:cover}

.dots{
position:absolute;bottom:10px;left:50%;
transform:translateX(-50%);
display:flex;gap:6px
}
.dot{
width:10px;height:10px;background:#fff;
border-radius:50%;opacity:.5;cursor:pointer
}
.dot.active{opacity:1}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;margin-top:30px
}
.card{
background:#fff;padding:15px;border-radius:10px;
transition:.3s
}
.card:hover{
transform:translateY(-6px);
box-shadow:0 10px 20px rgba(0,0,0,0.1)
}
.card img{width:100%;height:200px;object-fit:cover}
.btn{
background:#0a6cdc;color:#fff;padding:10px;
border:none;margin-top:10px;cursor:pointer;border-radius:5px
}

/* CART */
.cart{
position:fixed;right:-350px;top:0;
width:300px;height:100%;background:#fff;
box-shadow:-2px 0 10px rgba(0,0,0,0.1);
padding:20px;transition:.3s;z-index:2000
}
.cart.open{right:0}

/* MOBILE */
@media(max-width:768px){
.container{grid-template-columns:1fr}
.sidebar{display:none}
}
</style>
</head>

<body>

<div class="topbar">
<span>🔥 Fast Delivery | Best Prices | Trusted Store 🔥</span>
</div>

<div class="header">
<div class="logo">ABC Store</div>

<div class="search">
<input placeholder="Search products">
</div>

<div class="icons" onclick="toggleCart()">🛒 (<span id="count">0</span>)</div>
</div>

<div class="nav">
Home Hot Deals Solar UPS Track Order
</div>

<div class="container">

<div class="sidebar">
<h3>Categories</h3>
<div>Solar</div>
<div>Inverters</div>
<div>Batteries</div>
</div>

<div>

<!-- SLIDER -->
<div class="hero">
<div class="slide active"><img src="https://via.placeholder.com/800x400"></div>
<div class="slide"><img src="https://via.placeholder.com/800x400/ff7a00"></div>
<div class="slide"><img src="https://via.placeholder.com/800x400/333"></div>

<div class="dots"></div>
</div>

<div class="products" id="products"></div>

</div>

</div>

<!-- CART -->
<div class="cart" id="cart">
<h3>Cart</h3>
<div id="cart-items"></div>
<p>Total: Rs. <span id="total">0</span></p>
</div>

<script>
const products=[
{id:1,name:"Product 1",price:1000,img:"https://via.placeholder.com/300"},
{id:2,name:"Product 2",price:1500,img:"https://via.placeholder.com/300"},
{id:3,name:"Product 3",price:2000,img:"https://via.placeholder.com/300"},
{id:4,name:"Product 4",price:2500,img:"https://via.placeholder.com/300"}
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];

// render products
document.getElementById("products").innerHTML=
products.map(p=>`
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>Rs. ${p.price}</p>
<button class="btn" onclick="addToCart(${p.id})">Add</button>
</div>
`).join("");

// cart logic
function addToCart(id){
let item=cart.find(p=>p.id===id);
if(item){item.qty++}
else{
let p=products.find(p=>p.id===id);
cart.push({...p,qty:1});
}
updateCart();
}

function updateCart(){
localStorage.setItem("cart",JSON.stringify(cart));
document.getElementById("count").innerText=
cart.reduce((a,b)=>a+b.qty,0);

document.getElementById("cart-items").innerHTML=
cart.map(i=>`<p>${i.name} x${i.qty}</p>`).join("");

document.getElementById("total").innerText=
cart.reduce((a,b)=>a+(b.price*b.qty),0);
}

function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

// slider
let slides=document.querySelectorAll(".slide");
let dotsContainer=document.querySelector(".dots");
let index=0;

slides.forEach((_,i)=>{
let d=document.createElement("div");
d.className="dot";
d.onclick=()=>showSlide(i);
dotsContainer.appendChild(d);
});

function showSlide(i){
slides.forEach(s=>s.classList.remove("active"));
dotsContainer.children[index].classList.remove("active");

index=i;
slides[index].classList.add("active");
dotsContainer.children[index].classList.add("active");
}

setInterval(()=>{
showSlide((index+1)%slides.length);
},3000);

updateCart();
</script>

</body>
</html>
